<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>题目详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .nav { background: #2c3e50; color: white; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
        .nav h1 { font-size: 20px; }
        .nav a { color: #aaa; text-decoration: none; font-size: 14px; }
        .nav a:hover { color: white; }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; display: flex; gap: 20px; }
        @media (max-width: 768px) { .container { flex-direction: column; } }
        .left { flex: 1; }
        .right { flex: 1; }
        .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .card h2 { font-size: 22px; margin-bottom: 16px; color: #333; }
        .card h3 { font-size: 16px; margin: 16px 0 8px; color: #555; }
        .card p { font-size: 14px; line-height: 1.7; color: #444; }
        .sample { background: #f8f9fa; border-radius: 6px; padding: 12px 16px; font-family: 'Consolas', monospace; font-size: 13px; white-space: pre-wrap; margin: 4px 0; border: 1px solid #e8e8e8; }
        .badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 10px; margin-left: 8px; }
        .badge-easy { background: #d4edda; color: #155724; }
        .badge-medium { background: #fff3cd; color: #856404; }
        .badge-hard { background: #f8d7da; color: #721c24; }
        .meta { font-size: 13px; color: #888; margin-bottom: 16px; }
        textarea { width: 100%; height: 300px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; }
        textarea:focus { outline: none; border-color: #4A90D9; }
        #submitBtn { padding: 10px 24px; background: #27ae60; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 12px; }
        #submitBtn:hover { background: #219a52; }
        #submitBtn:disabled { background: #aaa; cursor: not-allowed; }
        #result { margin-top: 12px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
        .result-ac { background: #d4edda; color: #155724; }
        .result-wa { background: #f8d7da; color: #721c24; }
        .result-ce { background: #fff3cd; color: #856404; }
        .result-re { background: #f8d7da; color: #721c24; }
        .result-pending { background: #e2e3e5; color: #383d41; }
        .loading { text-align: center; padding: 48px; color: #999; }
        .btn-back { padding: 8px 16px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="nav">
        <h1><a href="problems.html" style="color:white;text-decoration:none;">← 返回列表</a></h1>
        <span style="font-size:14px;" id="userDisplay"></span>
    </div>

    <div class="container">
        <div class="left">
            <div class="card" id="problemCard">
                <div class="loading">加载中...</div>
            </div>
        </div>
        <div class="right">
            <div class="card">
                <h3 style="margin-top:0;">提交代码</h3>
                <textarea id="codeArea" placeholder="在这里写你的 Java 代码...">import java.util.Scanner;
public class Main {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

    }
}</textarea>
                <button id="submitBtn" onclick="submitCode()">提交评测</button>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('username');
        if (!username) window.location.href = 'login.html';
        document.getElementById('userDisplay').textContent = '👤 ' + username;

        const params = new URLSearchParams(location.search);
        const problemId = params.get('id');

        async function loadProblem() {
            try {
                const res = await fetch(`/problem/${problemId}`);
                const p = await res.json();
                const badgeClass = p.difficulty === 1 ? 'badge-easy' : p.difficulty === 2 ? 'badge-medium' : 'badge-hard';
                const difficultyLabel = p.difficulty === 1 ? '简单' : p.difficulty === 2 ? '中等' : '困难';

                document.getElementById('problemCard').innerHTML = `
                    <h2>${p.id}. ${p.title} <span class="badge ${badgeClass}">${difficultyLabel}</span></h2>
                    <div class="meta">时间限制：${p.timeLimit}ms &nbsp;|&nbsp; 内存限制：${p.memoryLimit}MB</div>
                    <h3>题目描述</h3>
                    <p>${p.description || '无'}</p>
                    <h3>输入描述</h3>
                    <p>${p.inputDesc || '无'}</p>
                    <h3>输出描述</h3>
                    <p>${p.outputDesc || '无'}</p>
                    <h3>样例输入</h3>
                    <div class="sample">${p.sampleInput || '无'}</div>
                    <h3>样例输出</h3>
                    <div class="sample">${p.sampleOutput || '无'}</div>
                `;
            } catch (e) {
                document.getElementById('problemCard').innerHTML = '<div class="loading">加载失败</div>';
            }
        }

        async function submitCode() {
            const code = document.getElementById('codeArea').value.trim();
            if (!code) { alert('请先写代码！'); return; }

            // 获取用户ID
            let userId = 1;
            try {
                const userRes = await fetch(`/user/getByUsername?username=${encodeURIComponent(username)}`);
                const user = await userRes.json();
                if (user && user.id) userId = user.id;
            } catch(e) {}

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '评测中...';
            document.getElementById('result').style.display = 'none';

            try {
                const res = await fetch('/submit/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problemId: parseInt(problemId), userId, code, language: 'java' })
                });
                await res.text();

                // 轮询结果
                const submitRes = await fetch('/submit/list?page=1&pageSize=1&problemId=' + problemId + '&userId=' + userId);
                const submitData = await submitRes.json();
                const latest = submitData.records ? submitData.records[0] : null;

                if (latest) {
                    showResult(latest.status, latest.result);
                }
            } catch (e) {
                showResult(-1, '请求失败：' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '提交评测';
            }
        }

        function showResult(status, result) {
            const div = document.getElementById('result');
            div.style.display = 'block';
            const map = { 0: '等待中', 1: '通过 (AC)', 2: '答案错误 (WA)', 3: '编译错误 (CE)', 4: '超时 (TLE)', 5: '超内存 (MLE)', 6: '运行时错误 (RE)' };
            const cls = { 0: 'result-pending', 1: 'result-ac', 2: 'result-wa', 3: 'result-ce', 4: 'result-wa', 5: 'result-wa', 6: 'result-re' };
            div.className = cls[status] || 'result-pending';
            div.innerHTML = `<strong>${map[status] || '未知'}</strong><br><pre style="margin-top:8px;font-size:13px;white-space:pre-wrap;">${result || ''}</pre>`;
        }

        loadProblem();
    </script>
</body>
</html>
